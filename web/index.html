<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 按章节转音频</title>
    <style>
      :root {
        --bg: #f6f3ef;
        --card: #fffdf8;
        --text: #1f1f1f;
        --sub: #666;
        --accent: #0e7a66;
        --accent-hover: #0c6655;
        --danger: #a43838;
        --border: #e5dfd4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
        background: radial-gradient(circle at 20% 0%, #ece5d8 0%, var(--bg) 45%);
        color: var(--text);
      }
      .wrap {
        max-width: 820px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(20, 18, 14, 0.06);
      }
      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 28px;
      }
      p {
        margin-top: 0;
        color: var(--sub);
      }
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      input, select, button {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 15px;
        background: #fff;
      }
      .row {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      button {
        margin-top: 8px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
      }
      button:hover { background: var(--accent-hover); }
      button[disabled] {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .progress-wrap {
        margin-top: 14px;
        display: none;
      }
      .progress-track {
        width: 100%;
        height: 12px;
        background: #ece7de;
        border-radius: 99px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #15937c, #0e7a66);
        transition: width 0.3s ease;
      }
      .meta {
        margin-top: 8px;
        font-size: 13px;
        color: var(--sub);
      }
      .status {
        min-height: 22px;
        margin-top: 12px;
        font-size: 14px;
      }
      .status.error { color: var(--danger); }
      .status.ok { color: var(--accent); }
      .tips {
        margin-top: 20px;
        font-size: 13px;
        color: var(--sub);
      }
      @media (max-width: 720px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>电子书按章节转音频</h1>
        <p>支持 AZW3 / EPUB / MOBI / PDF / TXT，实时展示进度和预计剩余时间。</p>

        <form id="form">
          <div class="field">
            <label for="pdf">电子书或文档文件</label>
            <input id="pdf" name="file" type="file" accept=".azw3,.azw,.epub,.mobi,.pdf,.txt,application/pdf,text/plain,application/epub+zip" required />
          </div>

          <div class="row">
            <div class="field">
              <label for="format">输出格式</label>
              <select id="format" name="format">
                <option value="mp3" selected>MP3（推荐，需 ffmpeg）</option>
                <option value="m4a">MP4 音频（m4a）</option>
              </select>
            </div>
            <div class="field">
              <label for="rate">语速（90-360）</label>
              <input id="rate" name="rate" type="number" min="90" max="360" value="180" />
            </div>
          </div>

          <div class="field">
            <label for="voice">语音（可选，mac 可用 `say -v ?` 查看）</label>
            <input id="voice" name="voice" type="text" placeholder="例如：Tingting / Mei-Jia / Alex" />
          </div>

          <button id="submit" type="submit">开始转换</button>
        </form>

        <div id="progressWrap" class="progress-wrap">
          <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
          <div id="meta" class="meta"></div>
        </div>

        <div id="status" class="status"></div>
        <div class="tips">提示：EPUB/MOBI/AZW3 需要系统安装 Calibre（提供 ebook-convert）。扫描件 PDF（纯图片）需要先 OCR。</div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");
      const statusBox = document.getElementById("status");
      const submitBtn = document.getElementById("submit");
      const progressWrap = document.getElementById("progressWrap");
      const progressBar = document.getElementById("progressBar");
      const meta = document.getElementById("meta");

      let pollTimer = null;
      let currentJobId = "";
      let currentFileBase = "book";

      function setStatus(text, cls = "") {
        statusBox.className = `status ${cls}`.trim();
        statusBox.textContent = text;
      }

      function setProgress(percent) {
        progressWrap.style.display = "block";
        progressBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
      }

      function fmtDuration(seconds) {
        const sec = Math.max(0, Math.floor(seconds || 0));
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m <= 0) return `${s}秒`;
        if (m < 60) return `${m}分${s}秒`;
        const h = Math.floor(m / 60);
        const rm = m % 60;
        return `${h}小时${rm}分`;
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      async function fetchStatus() {
        if (!currentJobId) return;
        try {
          const res = await fetch(`/api/jobs/${currentJobId}`);
          if (!res.ok) {
            throw new Error(`查询进度失败（HTTP ${res.status}）`);
          }
          const st = await res.json();

          const percent = (Number(st.progress || 0) * 100).toFixed(1);
          setProgress(percent);
          meta.textContent = `进度 ${percent}% | 章节 ${st.done_chapters || 0}/${st.total_chapters || 0} | 已耗时 ${fmtDuration(st.elapsed_sec)} | 预计剩余 ${fmtDuration(st.estimated_remain_sec)}`;

          if (st.status === "failed") {
            stopPolling();
            submitBtn.disabled = false;
            setStatus(st.error || "转换失败", "error");
            return;
          }

          if (st.status === "done") {
            stopPolling();
            submitBtn.disabled = false;
            setProgress(100);
            meta.textContent = `进度 100% | 总耗时 ${fmtDuration(st.elapsed_sec)}`;
            setStatus("转换完成，正在下载 ZIP...", "ok");

            const a = document.createElement("a");
            const url = st.download_url || `/api/jobs/${currentJobId}/download`;
            a.href = url;
            a.download = `${currentFileBase}_chapters.zip`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            return;
          }

          const stage = st.stage || "处理中";
          const chapter = st.current_chapter ? `（${st.current_chapter}）` : "";
          setStatus(`${stage}${chapter}`, "");
        } catch (err) {
          stopPolling();
          submitBtn.disabled = false;
          setStatus(err.message || "查询进度失败", "error");
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const file = document.getElementById("pdf").files[0];
        if (!file) {
          setStatus("请先选择一个 PDF 文件。", "error");
          return;
        }

        stopPolling();
        progressWrap.style.display = "none";
        setProgress(0);
        meta.textContent = "";
        setStatus("正在创建任务...", "");

        submitBtn.disabled = true;
        currentFileBase = file.name.replace(/\.pdf$/i, "") || "book";

        try {
          const formData = new FormData(form);
          const res = await fetch("/api/jobs", {
            method: "POST",
            body: formData
          });

          if (!res.ok) {
            let msg = `创建任务失败（HTTP ${res.status}）`;
            try {
              const json = await res.json();
              if (json.error) msg = json.error;
            } catch (_) {}
            throw new Error(msg);
          }

          const data = await res.json();
          currentJobId = data.job_id;
          setStatus("任务已提交，开始转换...", "");
          setProgress(1);

          await fetchStatus();
          pollTimer = setInterval(fetchStatus, 1500);
        } catch (err) {
          submitBtn.disabled = false;
          setStatus(err.message || "创建任务失败", "error");
        }
      });
    </script>
  </body>
</html>
